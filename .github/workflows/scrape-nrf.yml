name: Scrape NRF fixtures & table

on:
  schedule:
    # 5am & 5pm NZST (UTC+12) — catches Saturday afternoon results + Sunday morning
    - cron: '0 5,17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Scrape NRF data
        run: node scripts/scrape-nrf.js

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet data/nrf.json && exit 0
          BRANCH="auto/nrf-update-$(date -u +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/nrf.json
          git commit -m "chore: update NRF data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update NRF data $(date -u +%Y-%m-%dT%H:%MZ)" \
            --body "Automated NRF data scrape." \
            --base main
          gh pr merge "$BRANCH" --auto --squash
